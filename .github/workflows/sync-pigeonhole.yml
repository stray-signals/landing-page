name: Sync Pigeonhole submodule

on:
  repository_dispatch:
    types: [pigeonhole-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULE_SYNC_TOKEN }}

      - name: Init pigeonhole submodule
        run: |
          git config submodule.root/projects/pigeonhole.url "https://x-access-token:${{ secrets.SUBMODULE_SYNC_TOKEN }}@github.com/stray-signals/Pigeonhole.git"
          git submodule update --init root/projects/pigeonhole

      - name: Pull latest pigeonhole commit
        run: |
          git -C root/projects/pigeonhole fetch origin main
          git -C root/projects/pigeonhole checkout main
          git -C root/projects/pigeonhole reset --hard origin/main

      - name: Commit and push pointer bump, if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add root/projects/pigeonhole
          if git diff --cached --quiet; then
            echo "Submodule already up to date — nothing to commit."
          else
            git commit -m "Sync pigeonhole-src submodule"
            git push
          fi
