name: Sync Pigeonhole submodule

on:
  repository_dispatch:
    types: [pigeonhole-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Pull latest pigeonhole commit
        run: |
          git -C external/pigeonhole-src fetch origin main
          git -C external/pigeonhole-src checkout main
          git -C external/pigeonhole-src reset --hard origin/main

      - name: Commit and push pointer bump, if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add external/pigeonhole-src
          if git diff --cached --quiet; then
            echo "Submodule already up to date — nothing to commit."
          else
            git commit -m "Sync pigeonhole-src submodule"
            git push
          fi
