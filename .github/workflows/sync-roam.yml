name: Sync ROAM submodule

on:
  repository_dispatch:
    types: [roam-updated]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ROAM_SYNC_TOKEN }}

      - name: Pull latest ROAM commit
        run: |
          git -C root/projects/roam fetch origin main
          git -C root/projects/roam checkout main
          git -C root/projects/roam reset --hard origin/main

      - name: Commit and push pointer bump, if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add root/projects/roam
          if git diff --cached --quiet; then
            echo "Submodule already up to date — nothing to commit."
          else
            git commit -m "Sync ROAM submodule"
            git push
          fi
