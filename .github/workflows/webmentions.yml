name: Send webmentions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  webmentions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send pending webmentions
        run: node scripts/send-webmentions.js

      - name: Commit signal_status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet root/transmissions/log.json; then
            echo "No changes to log.json, nothing to commit."
          else
            git add root/transmissions/log.json
            git commit -m "chore: update signal_status after webmention dispatch"
            git push
          fi
