name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_webmentions:
        description: 'Force send all pending webmentions regardless of log.json diff'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  # Check whether log.json was touched in this push.
  # If not, skip the webmentions job entirely - saves Actions minutes.
  check-log:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: update signal_sent')"
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: diff
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'transmissions/log.json'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  webmentions:
    runs-on: ubuntu-latest
    needs: [deploy, check-log]
    if: needs.check-log.outputs.changed == 'true' || inputs.force_webmentions == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send pending webmentions
        run: node scripts/send-webmentions.js

      - name: Commit signal_sent updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet transmissions/log.json; then
            echo "No signals sent, nothing to commit."
          else
            git add transmissions/log.json
            git commit -m "chore: update signal_sent flags after webmention dispatch"
            git push
          fi
