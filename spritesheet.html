<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>straysignals :: expression spritesheet</title>
  <style>
    :root {
      --color-primary:     #b8ffa0;
      --color-primary-dim: #b8e4a0;
      --color-bg:          #0c100c;
      --color-border:      #2f4f2f;
      --color-accent:      #6cb03e;
      --color-accent-hi:   #8fdf5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-bg);
      color: var(--color-primary);
      font-family: monospace;
      padding: 2rem;
    }
    h1 { font-size: 1rem; margin-bottom: 2rem; opacity: 0.5; letter-spacing: 0.1em; }
    h2 { font-size: 0.8rem; margin: 2.5rem 0 1rem; opacity: 0.4; letter-spacing: 0.15em; text-transform: uppercase; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .cell canvas {
      width: 256px;
      height: 256px;
      image-rendering: pixelated;
    }
    .label {
      font-size: 0.65rem;
      opacity: 0.4;
      text-align: center;
      max-width: 256px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>straysignals.dev :: expression spritesheet</h1>
  <div id="root"></div>

  <script>
    // Apply theme color from URL param before rendering
    (function() {
      const hex = new URLSearchParams(location.search).get('color');
      if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
      function hexToH(hex) {
        let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
        const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
        if (d === 0) return 0;
        let h = max === r ? ((g-b)/d + (g<b?6:0))/6 : max === g ? ((b-r)/d+2)/6 : ((r-g)/d+4)/6;
        return Math.round(h * 360);
      }
      function hsl(h,s,l) {
        s/=100; l/=100; const a = s*Math.min(l,1-l);
        const f = n => { const k=(n+h/30)%12; return Math.round(255*(l-a*Math.max(Math.min(k-3,9-k,1),-1))).toString(16).padStart(2,'0'); };
        return `#${f(0)}${f(8)}${f(4)}`;
      }
      const h = hexToH(hex), r = document.documentElement;
      r.style.setProperty('--color-primary',     hsl(h,100,81));
      r.style.setProperty('--color-primary-dim',  hsl(h, 51,76));
      r.style.setProperty('--color-bg',           hsl(h, 14, 5));
      r.style.setProperty('--color-border',       hsl(h, 25,24));
      r.style.setProperty('--color-accent',       hsl(h, 47,46));
      r.style.setProperty('--color-accent-hi',    hsl(h, 68,61));
    })();
  </script>
  <script type="module">
    import { buildExpression, buildFace, renderGrid } from './avatar/expression.builder.js';
    import { FACE_IDS } from './avatar/fullFace.js';
    import { EYE_IDS } from './avatar/eyes.js';
    import { MOUTH_IDS } from './avatar/mouths.js';

    const CELL_W = 4; // 64 cols × 4px = 256px
    const CELL_H = 8; // 32 rows × 8px = 256px
    const root = document.getElementById('root');

    function makeCanvas() {
      const c = document.createElement('canvas');
      c.width  = 256;
      c.height = 256;
      return c;
    }

    function makeCell(label) {
      const cell  = document.createElement('div');
      cell.className = 'cell';
      const canvas = makeCanvas();
      const lbl   = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = label;
      cell.appendChild(canvas);
      cell.appendChild(lbl);
      return { cell, ctx: canvas.getContext('2d') };
    }

    function section(title) {
      const h = document.createElement('h2');
      h.textContent = title;
      root.appendChild(h);
      const grid = document.createElement('div');
      grid.className = 'grid';
      root.appendChild(grid);
      return grid;
    }

    // ── Full faces ──────────────────────────────────────────────────────────
    const faceGrid = section('full faces');
    for (const id of FACE_IDS) {
      const { cell, ctx } = makeCell(id);
      renderGrid(ctx, buildFace(id), CELL_W, CELL_H);
      faceGrid.appendChild(cell);
    }

    // ── Eye × Mouth combinations ────────────────────────────────────────────
    for (const eyeID of EYE_IDS) {
      const mouthGrid = section(`eyes: ${eyeID}`);
      for (const mouthID of MOUTH_IDS) {
        const { cell, ctx } = makeCell(mouthID);
        renderGrid(ctx, buildExpression(eyeID, mouthID), CELL_W, CELL_H);
        mouthGrid.appendChild(cell);
      }
    }
  </script>
</body>
</html>
