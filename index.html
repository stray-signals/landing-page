<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>straysignals.dev :: interactive terminal</title>
  <link rel="stylesheet" href="css/main.css">

  <!-- IndieWeb identity — add more rel="me" links as you join platforms -->
  <link rel="me" href="https://github.com/stray-signals">
  <link rel="webmention" href="https://webmention.io/straysignals.dev/webmention">
  <link rel="authorization_endpoint" href="https://indieauth.com/auth">
  <link rel="token_endpoint" href="https://tokens.indieauth.com/token">
  <link rel="alternate" type="application/atom+xml" title="straysignals.dev :: transmission log" href="/signal.xml">
</head>
<body>
<div class="dashboard-wrapper">
  <div class="dashboard">
    <div class="face-panel crt-effect">
      <canvas id="pixelFaceCanvas" width="512" height="512"></canvas>
    </div>
    <div class="terminal-panel crt-effect" id="terminalPanel">
      <div class="command-history" id="commandHistory"></div>
      <div class="input-line">
        <span class="input-prompt" id="inputPrompt">stray@signal:~$</span>
        <div class="command-editor" id="commandEditor">
          <span id="editableSpan" class="editable-area" contenteditable="true"></span>
          <span class="block-cursor" id="blockCursor"></span>
        </div>
      </div>
    </div>
  </div>
  <!-- h-card: machine-readable IndieWeb identity — intentionally hidden -->
  <div class="h-card" style="display:none">
    <span class="p-name">StraySignal</span>
    <a class="u-url" href="https://straysignals.dev">straysignals.dev</a>
    <a class="u-email" href="mailto:contact@straysignals.dev">contact@straysignals.dev</a>
  </div>
</div>

<script type="module" src="avatar/avatar.js"></script>
<script type="module" src="terminal/terminal.js"></script>
</body>
</html>
