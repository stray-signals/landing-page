<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>straysignals.dev :: interactive terminal</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- IndieWeb identity -->
  <link rel="me" href="https://github.com/stray-signals">
  <link rel="webmention" href="https://webmention.io/straysignals.dev/webmention">
  <link rel="authorization_endpoint" href="https://indieauth.com/auth">
  <link rel="token_endpoint" href="https://tokens.indieauth.com/token">
  <link rel="alternate" type="application/atom+xml" title="straysignals.dev :: transmission log" href="/signal.xml">
</head>
<body>
<div id="desktop" class="dashboard">

  <!-- ── Avatar window ───────────────────────────────────────────── -->
  <div class="crt-window" id="win-avatar" data-title="stray">
    <div class="window-titlebar">
      <span class="window-title">stray</span>
      <div class="window-controls">
        <button class="win-btn win-min"   title="minimize">−</button>
        <button class="win-btn win-max"   title="expand">○</button>
        <button class="win-btn win-close" title="close">×</button>
      </div>
    </div>
    <div class="window-body">
      <div class="face-panel crt-effect">
        <canvas id="pixelFaceCanvas" width="512" height="512"></canvas>
      </div>
    </div>
    <div class="rz rz-n"  data-dir="n"></div>
    <div class="rz rz-s"  data-dir="s"></div>
    <div class="rz rz-e"  data-dir="e"></div>
    <div class="rz rz-w"  data-dir="w"></div>
    <div class="rz rz-nw" data-dir="nw"></div>
    <div class="rz rz-ne" data-dir="ne"></div>
    <div class="rz rz-sw" data-dir="sw"></div>
    <div class="rz rz-se" data-dir="se"></div>
  </div>

  <!-- ── Terminal window ─────────────────────────────────────────── -->
  <div class="crt-window" id="win-terminal" data-title="terminal">
    <div class="window-titlebar">
      <span class="window-title">terminal</span>
      <div class="window-controls">
        <button class="win-btn win-min"   title="minimize">−</button>
        <button class="win-btn win-max"   title="expand">○</button>
        <button class="win-btn win-close" title="close">×</button>
      </div>
    </div>
    <div class="window-body">
      <div class="terminal-panel crt-effect" id="terminalPanel">
        <div class="command-history" id="commandHistory"></div>
        <div class="input-line">
          <span class="input-prompt" id="inputPrompt">stray@signal:~$</span>
          <div class="command-editor" id="commandEditor">
            <span id="editableSpan" class="editable-area" contenteditable="true"></span>
            <span class="block-cursor" id="blockCursor"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="rz rz-n"  data-dir="n"></div>
    <div class="rz rz-s"  data-dir="s"></div>
    <div class="rz rz-e"  data-dir="e"></div>
    <div class="rz rz-w"  data-dir="w"></div>
    <div class="rz rz-nw" data-dir="nw"></div>
    <div class="rz rz-ne" data-dir="ne"></div>
    <div class="rz rz-sw" data-dir="sw"></div>
    <div class="rz rz-se" data-dir="se"></div>
  </div>

  <!-- h-card: machine-readable IndieWeb identity - intentionally hidden -->
  <div class="h-card" style="display:none">
    <span class="p-name">StraySignal</span>
    <a class="u-url" href="https://straysignals.dev">straysignals.dev</a>
    <a class="u-email" href="mailto:contact@straysignals.dev">contact@straysignals.dev</a>
  </div>

  <!-- Taskbar -->
  <div id="taskbar"></div>

</div>

<script type="module" src="avatar/avatar.js"></script>
<script type="module" src="terminal/terminal.js"></script>
<script type="module" src="scripts/desktop.js"></script>

<!-- CRT overlay layers -->
<div class="crt-overlay"></div>
<div class="crt-cool-tint"></div>

<script>
(function initCRTFlicker() {
  const target = document.documentElement;

  let lastFlicker = 0;
  let currentOpacity = 1;
  let targetOpacity = 1;
  let nextFlickerDelay = 0;

  function flicker(timestamp) {
    if (timestamp - lastFlicker > nextFlickerDelay) {
      if (Math.random() > 0.4) {
        targetOpacity = 0.82 + Math.random() * 0.18;
      } else {
        targetOpacity = 1;
      }
      lastFlicker = timestamp;
      nextFlickerDelay = 40 + Math.random() * 140;
    }

    currentOpacity += (targetOpacity - currentOpacity) * 0.3;
    target.style.opacity = currentOpacity;

    requestAnimationFrame(flicker);
  }

  requestAnimationFrame(flicker);
})();
</script>
</body>
</html>
