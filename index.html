<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>straysignals.dev :: interactive terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Lock body to viewport – no page scroll */
    html, body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f0a, #030603);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', 'Fira Code', monospace;
      padding: 1rem;
    }

    .dashboard-wrapper {
      max-width: 1200px;
      width: 100%;
      height: auto;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      width: 100%;
      justify-content: center;
      align-items: flex-start;
    }

    /* SQUARE PANEL */
    .face-panel {
      flex: 1;
      min-width: 200px;
      aspect-ratio: 1 / 1;
      background: #0c100c;
      border: 2px solid #2f4f2f;
      border-radius: 28px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 10px rgba(0, 20, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .crt-effect {
      position: relative;
    }
    .crt-effect::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 0, 0.03) 0px,
        rgba(0, 255, 0, 0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
    }

    .face-panel canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background: #030c03;
      cursor: pointer;
    }

    /* TERMINAL PANEL – internal scroll only */
    .terminal-panel {
      flex: 1.5;
      min-width: 260px;
      background: #0c100c;
      border: 2px solid #2f4f2f;
      border-radius: 28px;
      padding: 1rem;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 10px rgba(0, 20, 0, 0.6);
      display: flex;
      flex-direction: column;
      height: auto;
      max-height: 70vh;
      overflow: hidden;
    }

    /* Scrollable command history */
    .command-history {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-entry {
      color: #b8e4a0;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .visitor-msg {
      color: #a0c0e0;
    }

    .stray-msg {
      color: #b8ffa0;
      margin-left: 0.5rem;
      border-left: 2px solid #3c7835;
      padding-left: 0.5rem;
    }

    /* PIXEL‑STYLE SCROLLBAR */
    .command-history::-webkit-scrollbar {
      width: 8px;
    }
    .command-history::-webkit-scrollbar-track {
      background: #0c100c;
      border-left: 1px solid #2f4f2f;
    }
    .command-history::-webkit-scrollbar-thumb {
      background: #6cb03e;
      border-radius: 0;
      border: 1px solid #3c7835;
    }
    .command-history::-webkit-scrollbar-thumb:hover {
      background: #8fdf5a;
    }

    /* Input line with contenteditable + block cursor */
    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-top: 1px solid #2f4f2f;
      padding-top: 0.8rem;
      margin-top: 0.5rem;
      font-family: inherit;
      flex-shrink: 0;
    }

    .input-prompt {
      color: #b8ffa0;
      font-weight: bold;
      white-space: nowrap;
    }

    .command-editor {
      background: transparent;
      border: none;
      color: #b8e4a0;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-size: 1rem;
      outline: none;
      flex: 1;
      min-width: 120px;
      position: relative;
      display: inline-flex;
      align-items: center;
      caret-color: transparent;
    }

    .editable-area {
      display: inline;
      white-space: pre;
      outline: none;
      background: transparent;
      color: #b8e4a0;
      font-family: inherit;
      font-size: inherit;
    }

    .block-cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.2rem;
      background-color: #b8e4a0;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 4px #8bc48a;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .contact-footer {
      margin-top: 0.5rem;
      text-align: right;
      font-size: 0.8rem;
      color: #3b6132;
      padding-right: 0.5rem;
      flex-shrink: 0;
    }

    .contact-footer a {
      color: #7bc45a;
      text-decoration: none;
      border-bottom: 1px dotted #3c7835;
    }

    .contact-footer a:hover {
      color: #d0ffb0;
      border-bottom: 1px solid #b8ffa0;
    }

    /* Responsive adjustments */
    @media (max-width: 700px) {
      body {
        padding: 0.5rem;
      }
      .dashboard {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .face-panel {
        max-width: 240px;
        width: 100%;
      }
      .terminal-panel {
        max-height: 55vh;
        width: 100%;
        padding: 0.8rem;
      }
      .input-prompt, .editable-area {
        font-size: 0.85rem;
      }
      .contact-footer {
        text-align: center;
      }
    }

    @media (max-height: 600px) {
      .terminal-panel {
        max-height: 50vh;
      }
      .face-panel {
        max-width: 180px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">
  <div class="dashboard">
    <div class="face-panel crt-effect">
      <canvas id="pixelFaceCanvas" width="512" height="512" style="width: 100%; height: 100%;"></canvas>
    </div>
    <div class="terminal-panel crt-effect" id="terminalPanel">
      <div class="command-history" id="commandHistory"></div>
      <div class="input-line">
        <span class="input-prompt">stray@signal:~$</span>
        <div class="command-editor" id="commandEditor">
          <span id="editableSpan" class="editable-area" contenteditable="true"></span>
          <span class="block-cursor" id="blockCursor"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="contact-footer">
    📡 <a href="mailto:contact@straysignals.dev">contact@straysignals.dev</a>
  </div>
</div>

<script>
  // --- Pixel face drawing (refined: neutral, happy, spooked, idle) ---
  const canvas = document.getElementById('pixelFaceCanvas');
  const ctx = canvas.getContext('2d');

  function drawPixelFace(expression = 'neutral') {
    ctx.clearRect(0, 0, 512, 512);
    ctx.fillStyle = '#0b1f0a';
    ctx.fillRect(0, 0, 512, 512);

    function setPixel(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * 16, y * 16, 16, 16);
    }

    if (expression === 'neutral') {
      // eyes: two single pixels
      setPixel(14, 16, '#b8ffa0');
      setPixel(17, 16, '#b8ffa0');
      // mouth: thin line (dim)
      for (let i = 14; i <= 17; i++) setPixel(i, 24, '#6cb03e');
    } 
    else if (expression === 'happy') {
      // eyes: two pixels each (wider)
      setPixel(13, 16, '#b8ffa0'); setPixel(14, 16, '#b8ffa0');
      setPixel(17, 16, '#b8ffa0'); setPixel(18, 16, '#b8ffa0');
      // smile curve
      setPixel(14, 23, '#b8ffa0'); setPixel(15, 23, '#b8ffa0');
      setPixel(16, 23, '#b8ffa0'); setPixel(17, 23, '#b8ffa0');
      setPixel(13, 24, '#b8ffa0'); setPixel(18, 24, '#b8ffa0');
    }
    else if (expression === 'spooked') {
      // large filled eyes (3x3 each)
      for (let x = 12; x <= 14; x++) {
        for (let y = 15; y <= 17; y++) setPixel(x, y, '#b8ffa0');
      }
      for (let x = 17; x <= 19; x++) {
        for (let y = 15; y <= 17; y++) setPixel(x, y, '#b8ffa0');
      }
      // O mouth (4x2)
      for (let x = 14; x <= 17; x++) {
        setPixel(x, 24, '#b8ffa0');
        setPixel(x, 25, '#b8ffa0');
      }
    }
    else if (expression === 'idle') {
      // colon eyes (vertical pair)
      setPixel(14, 16, '#b8ffa0');
      setPixel(14, 18, '#b8ffa0');
      setPixel(17, 16, '#b8ffa0');
      setPixel(17, 18, '#b8ffa0');
      // underscore mouth
      setPixel(14, 24, '#6cb03e');
      setPixel(15, 24, '#6cb03e');
      setPixel(16, 24, '#6cb03e');
      setPixel(17, 24, '#6cb03e');
    }

    // subtle random static (keeps the CRT feel)
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 800; i++) {
      ctx.fillStyle = '#40ff40';
      ctx.fillRect(Math.floor(Math.random() * 512), Math.floor(Math.random() * 512), 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // Start with neutral
  drawPixelFace('neutral');

  // Interactive face (mouse/click) – temporarily overrides idle timer
  canvas.addEventListener('mouseenter', () => {
    drawPixelFace('spooked');
    resetIdleTimer();   // also reset idle when face is interacted
  });
  canvas.addEventListener('mouseleave', () => {
    drawPixelFace('neutral');
    resetIdleTimer();
  });
  canvas.addEventListener('click', () => {
    drawPixelFace('happy');
    setTimeout(() => drawPixelFace('neutral'), 1500);
    resetIdleTimer();
  });

  // --- Idle timer: after 10 seconds of no user activity, show 'idle' face ---
  let idleTimeout;

  function resetIdleTimer() {
    if (idleTimeout) clearTimeout(idleTimeout);
    // Reset to neutral if currently idle
    if (currentExpression !== 'neutral' && currentExpression !== 'happy' && currentExpression !== 'spooked') {
      drawPixelFace('neutral');
    }
    idleTimeout = setTimeout(() => {
      drawPixelFace('idle');
    }, 10000);
  }

  // Keep track of last expression for non‑interruption (optional)
  let currentExpression = 'neutral';

  // Override drawPixelFace to update currentExpression
  const originalDraw = drawPixelFace;
  window.drawPixelFace = function(expr) {
    currentExpression = expr;
    originalDraw(expr);
  };
  drawPixelFace = window.drawPixelFace;

  // Call resetIdleTimer on any user activity (terminal input, clicks, keypress)
  function userActivity() {
    resetIdleTimer();
  }

  // --- Terminal logic (contenteditable + block cursor) ---
  const historyDiv = document.getElementById('commandHistory');
  const editableSpan = document.getElementById('editableSpan');

  function placeCaretAtEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function addMessage(sender, text) {
    const entry = document.createElement('div');
    entry.className = `history-entry ${sender === 'visitor' ? 'visitor-msg' : 'stray-msg'}`;
    if (sender === 'visitor') {
      entry.textContent = text;
    } else {
      entry.textContent = `@stray: ${text}`;
    }
    historyDiv.appendChild(entry);
    historyDiv.scrollTop = historyDiv.scrollHeight;
  }

  function processCommand(cmd) {
    const trimmed = cmd.trim().toLowerCase();
    if (trimmed === 'whoami') {
      addMessage('stray', 'StraySignal — lost transmission // coder, wanderer, void-listener. I haunt these woods and the space between signals.');
    } else if (trimmed === 'help') {
      addMessage('stray', 'Available: whoami, help, clear');
    } else if (trimmed === 'clear') {
      historyDiv.innerHTML = '';
    } else if (trimmed !== '') {
      addMessage('stray', `Command not recognized: "${cmd}". Try "help".`);
    }
  }

  editableSpan.addEventListener('keydown', (e) => {
    userActivity();  // reset idle timer on any key
    if (e.key === 'Enter') {
      e.preventDefault();
      const cmd = editableSpan.textContent;
      if (cmd.trim() !== '') {
        addMessage('visitor', cmd);
        processCommand(cmd);
      }
      editableSpan.textContent = '';
      placeCaretAtEnd(editableSpan);
    }
  });

  // Focus management: ensure editable area gets focus when clicking terminal
  const terminalPanelDiv = document.getElementById('terminalPanel');
  terminalPanelDiv.addEventListener('click', (e) => {
    userActivity();
    if (e.target !== editableSpan && !editableSpan.contains(e.target)) {
      editableSpan.focus();
      placeCaretAtEnd(editableSpan);
    }
  });

  editableSpan.addEventListener('focus', () => {
    userActivity();
    placeCaretAtEnd(editableSpan);
  });
  editableSpan.addEventListener('input', userActivity);

  // Global click listener to catch any clicks outside terminal (still resets idle)
  document.body.addEventListener('click', userActivity);

  // Initial focus and idle timer start
  editableSpan.focus();
  placeCaretAtEnd(editableSpan);
  resetIdleTimer();

  // --- Equal height sync (desktop only) – optional ---
  function syncHeights() {
    const facePanel = document.querySelector('.face-panel');
    const terminalPanel = document.getElementById('terminalPanel');
    if (window.innerWidth > 700 && facePanel && terminalPanel) {
      const faceHeight = facePanel.offsetHeight;
      if (faceHeight > 0) {
        terminalPanel.style.height = faceHeight + 'px';
      }
    } else if (terminalPanel) {
      terminalPanel.style.height = 'auto';
    }
  }
  window.addEventListener('load', syncHeights);
  window.addEventListener('resize', syncHeights);
  if (window.ResizeObserver) {
    const resizeObserver = new ResizeObserver(syncHeights);
    const facePanel = document.querySelector('.face-panel');
    if (facePanel) resizeObserver.observe(facePanel);
  }
</script>
</body>
</html>
