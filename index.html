<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>straysignals.dev :: interactive terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f0a, #030603);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Fira Code', monospace;
      padding: 1.5rem;
    }

    .dashboard-wrapper {
      max-width: 1200px;
      width: 100%;
      position: relative;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      width: 100%;
      justify-content: center;
      align-items: flex-start;
    }

    /* SQUARE PANEL */
    .face-panel {
      flex: 1;
      min-width: 260px;
      aspect-ratio: 1 / 1;
      background: #0c100c;
      border: 2px solid #2f4f2f;
      border-radius: 28px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 10px rgba(0, 20, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .crt-effect {
      position: relative;
    }
    .crt-effect::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 0, 0.03) 0px,
        rgba(0, 255, 0, 0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
    }

    .face-panel canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background: #030c03;
      cursor: pointer;
    }

    /* RECTANGLE PANEL */
    .terminal-panel {
      flex: 1.5;
      min-width: 280px;
      background: #0c100c;
      border: 2px solid #2f4f2f;
      border-radius: 28px;
      padding: 1rem;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.15), inset 0 0 10px rgba(0, 20, 0, 0.6);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Scrollable command history */
    .command-history {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding-right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: calc(100% - 60px);
    }

    .history-entry {
      color: #b8e4a0;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .visitor-msg {
      color: #a0c0e0;
    }

    .stray-msg {
      color: #b8ffa0;
      margin-left: 0.5rem;
      border-left: 2px solid #3c7835;
      padding-left: 0.5rem;
    }

    /* PIXEL‑STYLE SCROLLBAR */
    .command-history::-webkit-scrollbar {
      width: 8px;
    }
    .command-history::-webkit-scrollbar-track {
      background: #0c100c;
      border-left: 1px solid #2f4f2f;
    }
    .command-history::-webkit-scrollbar-thumb {
      background: #6cb03e;
      border-radius: 0;
      border: 1px solid #3c7835;
    }
    .command-history::-webkit-scrollbar-thumb:hover {
      background: #8fdf5a;
    }

    /* Input line with contenteditable + block cursor */
    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-top: 1px solid #2f4f2f;
      padding-top: 0.8rem;
      margin-top: 0.5rem;
      font-family: inherit;
    }

    .input-prompt {
      color: #b8ffa0;
      font-weight: bold;
      white-space: nowrap;
    }

    .command-editor {
      background: transparent;
      border: none;
      color: #b8e4a0;
      font-family: 'Courier New', 'Fira Code', monospace;
      font-size: 1rem;
      outline: none;
      flex: 1;
      min-width: 120px;
      position: relative;
      display: inline-flex;
      align-items: center;
      caret-color: transparent; /* hide default caret */
    }

    /* The editable area */
    .editable-area {
      display: inline;
      white-space: pre;
      outline: none;
      background: transparent;
      color: #b8e4a0;
      font-family: inherit;
      font-size: inherit;
    }

    /* Blinking block cursor (fake caret) */
    .block-cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.2rem;
      background-color: #b8e4a0;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 4px #8bc48a;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .contact-footer {
      margin-top: 0.5rem;
      text-align: right;
      font-size: 0.8rem;
      color: #3b6132;
      padding-right: 0.5rem;
    }

    .contact-footer a {
      color: #7bc45a;
      text-decoration: none;
      border-bottom: 1px dotted #3c7835;
    }

    .contact-footer a:hover {
      color: #d0ffb0;
      border-bottom: 1px solid #b8ffa0;
    }

    @media (max-width: 700px) {
      .dashboard {
        flex-direction: column;
        align-items: center;
      }
      .face-panel {
        max-width: 320px;
        width: 100%;
      }
      .terminal-panel {
        width: 100%;
        padding: 0.8rem;
      }
      .contact-footer {
        text-align: center;
      }
      .input-prompt {
        font-size: 0.85rem;
      }
      .editable-area {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">
  <div class="dashboard">
    <div class="face-panel crt-effect">
      <canvas id="pixelFaceCanvas" width="512" height="512" style="width: 100%; height: 100%;"></canvas>
    </div>
    <div class="terminal-panel crt-effect" id="terminalPanel">
      <div class="command-history" id="commandHistory"></div>
      <div class="input-line">
        <span class="input-prompt">stray@signal:~$</span>
        <div class="command-editor" id="commandEditor">
          <span id="editableSpan" class="editable-area" contenteditable="true"></span>
          <span class="block-cursor" id="blockCursor"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="contact-footer">
    📡 <a href="mailto:contact@straysignals.dev">contact@straysignals.dev</a>
  </div>
</div>

<script>
  // ------ Pixel face drawing (unchanged) ------
  const canvas = document.getElementById('pixelFaceCanvas');
  const ctx = canvas.getContext('2d');

  function drawPixelFace(expression = 'neutral') {
    ctx.clearRect(0, 0, 512, 512);
    ctx.fillStyle = '#0b1f0a';
    ctx.fillRect(0, 0, 512, 512);

    function setPixel(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * 16, y * 16, 16, 16);
    }

    if (expression === 'neutral') {
      for (let x = 12; x <= 13; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#a8e6a0');
      }
      for (let x = 18; x <= 19; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#a8e6a0');
      }
      for (let i = 12; i <= 19; i++) setPixel(i, 24, '#8bc47a');
    } 
    else if (expression === 'happy') {
      for (let x = 12; x <= 13; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#b8ffa0');
      }
      for (let x = 18; x <= 19; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#b8ffa0');
      }
      for (let i = 12; i <= 19; i++) setPixel(i, 24, '#9fd48a');
      setPixel(13, 23, '#9fd48a');
      setPixel(14, 22, '#9fd48a');
      setPixel(15, 22, '#9fd48a');
      setPixel(16, 22, '#9fd48a');
      setPixel(17, 23, '#9fd48a');
      setPixel(14, 24, '#b8e4a0');
      setPixel(15, 24, '#b8e4a0');
    }
    else if (expression === 'spooked') {
      for (let x = 9; x <= 14; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#c8ffb0');
      }
      for (let x = 17; x <= 22; x++) {
        for (let y = 16; y <= 17; y++) setPixel(x, y, '#c8ffb0');
      }
      for (let x = 14; x <= 17; x++) {
        setPixel(x, 24, '#b0e08a');
        setPixel(x, 25, '#b0e08a');
      }
    }

    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 800; i++) {
      ctx.fillStyle = '#40ff40';
      ctx.fillRect(Math.floor(Math.random() * 512), Math.floor(Math.random() * 512), 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  drawPixelFace('neutral');

  canvas.addEventListener('mouseenter', () => drawPixelFace('spooked'));
  canvas.addEventListener('mouseleave', () => drawPixelFace('neutral'));
  canvas.addEventListener('click', () => {
    drawPixelFace('happy');
    setTimeout(() => drawPixelFace('neutral'), 1500);
  });

  // ------ Terminal logic with contenteditable + block cursor ------
  const historyDiv = document.getElementById('commandHistory');
  const editableSpan = document.getElementById('editableSpan');
  const blockCursor = document.getElementById('blockCursor');

  // Focus management: clicking anywhere on terminal panel focuses the editable area
  const terminalPanelDiv = document.getElementById('terminalPanel');
  terminalPanelDiv.addEventListener('click', (e) => {
    // Don't steal focus if already clicking inside editable area
    if (e.target !== editableSpan && !editableSpan.contains(e.target)) {
      editableSpan.focus();
    }
  });

  // Ensure the cursor stays at the end when editing
  function placeCaretAtEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false); // false = to end
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  editableSpan.addEventListener('focus', () => {
    placeCaretAtEnd(editableSpan);
    // Show block cursor (it's always visible, but we keep it)
  });

  // When the user presses Enter, submit the command
  editableSpan.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const cmd = editableSpan.textContent;
      if (cmd.trim() !== '') {
        addMessage('visitor', cmd);
        processCommand(cmd);
      }
      editableSpan.textContent = '';
      placeCaretAtEnd(editableSpan);
    } else if (e.key === 'Backspace') {
      // Allow default behavior
    }
  });

  function addMessage(sender, text) {
    const entry = document.createElement('div');
    entry.className = `history-entry ${sender === 'visitor' ? 'visitor-msg' : 'stray-msg'}`;
    if (sender === 'visitor') {
      entry.textContent = text;
    } else {
      entry.textContent = `@stray: ${text}`;
    }
    historyDiv.appendChild(entry);
    historyDiv.scrollTop = historyDiv.scrollHeight;
  }

  function processCommand(cmd) {
    const trimmed = cmd.trim().toLowerCase();
    if (trimmed === 'whoami') {
      addMessage('stray', 'StraySignal — lost transmission // coder, wanderer, void-listener. I haunt these woods and the space between signals.');
    } else if (trimmed === 'help') {
      addMessage('stray', 'Available: whoami, help, clear');
    } else if (trimmed === 'clear') {
      historyDiv.innerHTML = '';
    } else if (trimmed !== '') {
      addMessage('stray', `Command not recognized: "${cmd}". Try "help".`);
    }
  }

  // Initial focus
  editableSpan.focus();
  placeCaretAtEnd(editableSpan);

  // ------ Equal height sync (desktop only) ------
  function syncHeights() {
    const facePanel = document.querySelector('.face-panel');
    const terminalPanelEl = document.getElementById('terminalPanel');
    if (window.innerWidth > 700 && facePanel && terminalPanelEl) {
      const faceHeight = facePanel.offsetHeight;
      if (faceHeight > 0) {
        terminalPanelEl.style.height = faceHeight + 'px';
      }
    } else if (terminalPanelEl) {
      terminalPanelEl.style.height = 'auto';
    }
  }

  window.addEventListener('load', syncHeights);
  window.addEventListener('resize', syncHeights);
  if (window.ResizeObserver) {
    const resizeObserver = new ResizeObserver(syncHeights);
    const facePanel = document.querySelector('.face-panel');
    if (facePanel) resizeObserver.observe(facePanel);
  }
</script>
</body>
</html>
